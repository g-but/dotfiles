# Minimal starship config — fast, informative, not noisy
format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$docker_context\
$cmd_duration\
$character"""

[directory]
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "[$branch]($style) "
style = "bold purple"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"

[nodejs]
format = "[$symbol$version]($style) "
symbol = " "
detect_extensions = []
detect_files = ["package.json"]

[python]
format = "[$symbol$version]($style) "
symbol = " "

[docker_context]
format = "[$symbol$context]($style) "
symbol = " "

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold yellow"
