# Font
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# Performance
repaint_delay    10
input_delay      3
sync_to_monitor  yes

# Scrollback
scrollback_lines 10000

# Window
remember_window_size  yes
confirm_os_window_close 0

# URLs
url_style curly
detect_urls yes
